name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - enhancement
      - feature
  - title: "🐛 Bug Fixes"
    labels:
      - bug
      - fix
  - title: "🧰 Maintenance"
    labels:
      - documentation
      - dependencies
      - github_actions
      - chore
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - enhancement
      - feature
      - minor
  patch:
    labels:
      - bug
      - fix
      - documentation
      - dependencies
      - github_actions
      - patch
  default: patch
template: |
  ## Changes

  $CHANGES

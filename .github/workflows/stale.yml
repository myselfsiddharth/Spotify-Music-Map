name: Stale

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: security,good first issue,pinned
          exempt-pr-labels: security,dependencies
          stale-issue-message: >
            This issue has been marked stale due to inactivity.
            It will be closed in 14 days unless there is new activity.
          close-issue-message: >
            Closing this issue due to prolonged inactivity.
            Please reopen if it is still relevant.
          stale-pr-message: >
            This pull request has been marked stale due to inactivity.
            It will be closed in 14 days unless there is new activity.
          close-pr-message: >
            Closing this pull request due to prolonged inactivity.
            Please reopen or open a new PR if you want to continue.
          operations-per-run: 40
